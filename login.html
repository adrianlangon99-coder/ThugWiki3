<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Log In | ThugWiki</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <nav class="auth-nav">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back
    </a>
    <h1 class="site-brand">ThugWiki</h1>
    <div class="nav-spacer"></div> 
  </nav>

  <main class="auth-main">
    <div class="glow-orb JSON-glow"></div>

    <div class="auth-card animate-in">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Log in to access the lore database and join the discussion.</p>
      </div>

      <div class="auth-sso-container">
        
        <button type="button" id="google-login-btn" class="btn-sso google-btn">
          <svg class="sso-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24c0-1.62-.15-3.18-.42-4.7H24v9h12.75c-.55 2.96-2.22 5.48-4.75 7.16l7.39 5.73C43.71 37.06 46.5 31.11 46.5 24z"/>
            <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.39-5.73c-2.11 1.42-4.81 2.3-8.5 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <button type="button" id="apple-login-btn" class="btn-sso apple-btn">
          <svg class="sso-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.57 2.95-1.39z"/>
          </svg>
          Continue with Apple
        </button>

      </div>

      <div id="login-error" class="login-error-message"></div>

      <div class="auth-footer">
        <p>Don't have an account yet?</p>
        <a href="signup.html" class="btn-secondary outline-btn">Create an Account</a>
      </div>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
